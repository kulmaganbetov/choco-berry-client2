    <ellipse cx="120" cy="124" rx="3.4" ry="5"/>
    <ellipse cx="144" cy="128" rx="3.4" ry="5" transform="rotate(18 144 128)"/>
    <ellipse cx="80"  cy="156" rx="3.4" ry="5" transform="rotate(-24 80 156)"/>
    <ellipse cx="108" cy="152" rx="3.4" ry="5" transform="rotate(-6 108 152)"/>
